- title: 'Step 1: The Regulatory Problem'
  center: [-73.8648, 40.8448]
  zoom: 12
  pitch: 0
  bearing: 0
  description: 'This map shows the regulatory "spillover" effect. Yellow lines are informal truck idling zones, often right next to schools, shown as red dots.'
  layers:
    - id: 'idling-zones'
      url: './data/Informal_Idling_Zones.geojson'
      type: 'line'
      data-type: 'geojson'
      layer-type: 'line'
      persist: true
      paint:
        line-color: '#f0a500'
        line-width: 2.5
        line-opacity: 0.8
    
    - id: 'school-points'
      url: './data/SchoolPoints APS 2024.geojson'
      type: 'circle'
      data-type: 'geojson'
      layer-type: 'circle'
      persist: false
      paint:
        circle-color: '#d90429' # Bright red
        circle-radius: 4
        circle-stroke-color: '#ffffff'
        circle-stroke-width: 1

- title: 'Step 2: The Analysis'
  center: [-73.8648, 40.8448]
  zoom: 12
  pitch: 0
  bearing: 0
  description: 'To quantify the risk, we created a Health Disparity Score (HDS) for every census block, using the same breaks from our analysis (0-8.1, 8.1-12.6, etc.). Areas in dark red have the highest health burdens.'
  layers:
    - id: 'census-base'
      url: './data/census_final.geojson'
      type: 'fill'
      data-type: 'geojson'
      layer-type: 'fill'
      persist: true
      paint:
        # This is the data-driven color ramp based on your HDS field
        # It uses the exact breaks from your PDF
        fill-color:
          - interpolate
          - ['linear']
          - ['get', 'HDS']
          - 0
          - '#ffffcc'  # 0 - 8.1
          - 8.1
          - '#fed976'  # 8.1 - 12.6
          - 12.6
          - '#feb24c'  # 12.6 - 17.6
          - 17.6
          - '#fd8d3c'  # 17.6 - 20
          - 20
          - '#e31a1c'
        fill-opacity: 0.7

- title: 'Step 3: The Solution'
  center: [-73.8648, 40.8448]
  zoom: 12
  pitch: 0
  bearing: 0
  description: "Finally, we identified the 'Priority Intervention Zones' - the areas with *both* high HDS scores and low tree canopy. These are the most critical areas for intervention, shown in dark brown."
  layers:
    - id: 'priority-zones'
      url: './data/Priority_Intervention_Zones.geojson'
      type: 'fill'
      data-type: 'geojson'
      layer-type: 'fill'
      persist: true
      paint:
        fill-color: '#6e4720'
        fill-outline-color: '#000000'
        fill-opacity: 0.9

- title: 'Synthesis: Problem & Solution'
  center: [-73.8648, 40.8448]
  zoom: 12.5
  pitch: 0
  bearing: 0
  description: "Here we see the full story. The yellow idling zones (the problem) are located directly within or next to the dark brown priority zones (the solution), proving the link between regulatory failure and community health."
  layers: []